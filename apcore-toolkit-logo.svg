<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- apcore-toolkit: Mascot Fusion (Jellyfish & Starfish) -->
  
  <defs>
    <!-- Jellyfish Gradients (from apcore-a2a) -->
    <radialGradient id="jelly_bellGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </radialGradient>
    <linearGradient id="jelly_tentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Starfish Gradient (from apcore-toolkit-image) -->
    <linearGradient id="star_bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- 1. PENDANT: Starfish (Toolkit) - Scaled and Positioned -->
  <g transform="translate(135, 290) scale(0.45)">
    <!-- Outline -->
    <path d="M 256,60 Q 275,60 290,170 Q 300,180 420,180 Q 440,180 435,205 Q 430,230 330,270 Q 320,275 350,380 Q 355,405 330,405 Q 305,405 256,330 Q 207,405 182,405 Q 157,405 162,380 Q 192,275 182,270 Q 82,230 77,205 Q 72,180 92,180 Q 212,180 222,170 Q 237,60 256,60 Z" 
          fill="none" stroke="#451A03" stroke-width="12" stroke-linejoin="round"/>
    <!-- Fill -->
    <path d="M 256,60 Q 275,60 290,170 Q 300,180 420,180 Q 440,180 435,205 Q 430,230 330,270 Q 320,275 350,380 Q 355,405 330,405 Q 305,405 256,330 Q 207,405 182,405 Q 157,405 162,380 Q 192,275 182,270 Q 82,230 77,205 Q 72,180 92,180 Q 212,180 222,170 Q 237,60 256,60 Z" 
          fill="url(#star_bodyGrad)"/>
    <!-- Texture -->
    <g fill="#92400E" opacity="0.4">
      <circle cx="256" cy="130" r="8"/><circle cx="215" cy="180" r="6"/><circle cx="297" cy="180" r="6"/>
      <circle cx="340" cy="240" r="7"/><circle cx="172" cy="240" r="7"/><circle cx="256" cy="280" r="10"/>
    </g>
    <!-- Face -->
    <circle cx="230" cy="225" r="12" fill="#451A03"/><circle cx="282" cy="225" r="12" fill="#451A03"/>
    <path d="M 245,245 Q 256,255 267,245" fill="none" stroke="#451A03" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="200" cy="245" rx="15" ry="10" fill="#F472B6" opacity="0.4"/>
    <ellipse cx="312" cy="245" rx="15" ry="10" fill="#F472B6" opacity="0.4"/>
  </g>

  <!-- 2. MAIN: Jellyfish (apcore) -->
  <g transform="translate(0, -60)">
    <!-- Tentacles -->
    <path d="M 175,300 C 160,350 145,390 155,430 Q 162,455 150,470" stroke="url(#jelly_tentGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 210,310 C 200,360 188,400 195,445 Q 200,465 190,480" stroke="url(#jelly_tentGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M 245,310 C 240,365 235,410 242,455 Q 248,475 240,490" stroke="url(#jelly_tentGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 267,310 C 272,365 277,410 270,455 Q 264,475 272,490" stroke="url(#jelly_tentGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 302,310 C 312,360 324,400 317,445 Q 312,465 322,480" stroke="url(#jelly_tentGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M 337,300 C 352,350 367,390 357,430 Q 350,455 362,470" stroke="url(#jelly_tentGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Bell -->
    <path d="M 130,290 C 130,150 190,80 256,80 C 322,80 382,150 382,290 Q 382,310 256,310 Q 130,310 130,290 Z" fill="url(#jelly_bellGrad)"/>
    <!-- Eyes -->
    <circle cx="222" cy="215" r="23" fill="white"/>
    <circle cx="290" cy="215" r="23" fill="white"/>
    <circle cx="228" cy="220" r="13" fill="#1E1B4B"/>
    <circle cx="296" cy="220" r="13" fill="#1E1B4B"/>
    <!-- Mouth -->
    <path d="M 240,252 Q 256,268 272,252" stroke="#312E81" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
